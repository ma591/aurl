version: 2

builds:
  - binary: arc
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - docs/arc.1
      - docs/completions/*
      - LICENSE
      - README.md

brews:
  - repository:
      owner: ShawnPana
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    description: "A command line tool for turning any API into a CLI command, supporting OpenAPI 3.0, OpenAPI 3.1, Swagger 2.0, and GraphQL"
    license: MIT
    install: |
      bin.install "arc"
      man1.install "docs/arc.1"
      zsh_completion.install "docs/completions/arc.zsh" => "_arc"
      bash_completion.install "docs/completions/arc.bash" => "arc"
      fish_completion.install "docs/completions/arc.fish"
    test: |
      assert_match "arc", shell_output("#{bin}/arc --help")
